<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GALAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="nebula"></div>
  <canvas id="stars"></canvas>

  <button id="mobile-menu-btn" aria-label="Открыть меню">☰</button>
  <div id="sidebar-backdrop"></div>

  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <img src="/android-chrome-192x192.png" alt="GALAI" class="brand-icon">
        <span>GALAI</span>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="chat">💬 Чаты</button>
        <button class="tab" data-tab="voice">🎙️ Голос</button>
      </div>

      <div id="projects-list"></div>

      <div class="sidebar-actions">
        <button id="new-project-btn">✦ Новый проект</button>
        <button id="reset-btn">🗑 Сбросить чаты</button>
      </div>
    </aside>

    <main id="main">
      <section id="chat-screen" class="screen active">
        <header class="topbar">
          <div>
            <div id="project-title" class="project-title">Личное</div>
            <h1 id="chat-title">Планирование</h1>
          </div>
          <div class="top-actions">
            <button id="new-chat-btn">+ Чат</button>
            <button id="search-mode-btn" title="Включить поиск">🌐 Поиск</button>
          </div>
        </header>

        <div id="messages-wrap"><div id="messages"></div></div>

        <form id="composer">
          <textarea id="msg-input" rows="1" placeholder="Напиши сообщение GALAI..."></textarea>
          <button id="send-btn" type="submit">↑</button>
        </form>
        <div class="hint">Enter — отправить · Shift+Enter — новая строка</div>
      </section>

      <section id="voice-screen" class="screen">
        <header class="topbar voice-topbar">
          <div>
            <div class="project-title">Голосовой режим</div>
            <h1>GALAI Voice</h1>
          </div>
          <button id="voice-back-btn">💬 Чаты</button>
        </header>

        <div class="voice-center">
          <button id="voice-orb" aria-label="Начать голос">🎙️</button>
          <div id="voice-status">Нажми на микрофон</div>
          <div id="voice-transcript"></div>
          <div id="voice-warning"></div>
          <div id="voice-fallback">
            <input id="voice-text-input" placeholder="Напиши вместо голоса..." />
            <button id="voice-text-send">➤</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
